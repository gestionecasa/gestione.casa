<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa — Agente Domestico</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌂</text></svg>">
</head>
<body>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <span class="brand-icon">⌂</span>
      <span class="brand-name">casa</span>
      <span class="brand-tag">demo</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Stato casa</div>
      <div class="status-grid" id="statusGrid"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Scadenze</div>
      <div class="deadlines-list" id="deadlinesList"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Spese questo mese</div>
      <div class="expenses-mini" id="expensesMini"></div>
    </div>

  </aside>

  <!-- ── CHAT MAIN ───────────────────────── -->
  <main class="chat-main">

    <header class="chat-header">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Apri menu">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="agent-identity">
        <div class="agent-avatar">⌂</div>
        <div>
          <span class="agent-name">Casa</span>
          <span class="agent-tagline" id="agentTagline">Pronto — cosa vuoi fare?</span>
        </div>
      </div>

      <button class="icon-btn" id="clearBtn" title="Nuova conversazione">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="messages" id="messages"></div>
    </div>

    <div class="input-zone">
      <div class="suggestions-row" id="suggestionsRow"></div>

      <div class="input-bar">
        <textarea
          id="userInput"
          placeholder="Scrivi a Casa…"
          rows="1"
          autocomplete="off"
          spellcheck="true"
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled aria-label="Invia">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

      <div class="input-hint">
        Premi <kbd>Enter</kbd> per inviare &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> per a capo
      </div>
    </div>

  </main>
</div>

<script src="assets/core/fake-agent.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
