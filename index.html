<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Casa — Il tuo agente domestico</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hey Casa">
  <link rel="apple-touch-icon" href="assets/images/logo.png">
</head>
<body>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-brand">
      <img src="assets/images/logo.png" alt="Casa" class="brand-logo">
      <span class="brand-tag">v0.1.0</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Stato casa</div>
      <div class="status-grid" id="statusGrid"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Scadenze</div>
      <div class="deadlines-list" id="deadlinesList"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Spese questo mese</div>
      <div class="expenses-mini" id="expensesMini"></div>
    </div>

  </aside>

  <!-- ── CHAT MAIN ───────────────────────── -->
  <main class="chat-main">

    <header class="chat-header">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Apri menu">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="agent-identity">
        <div class="agent-avatar" id="agentAvatar">
          <span class="avatar-orb" id="avatarOrb"></span>
        </div>
        <div>
          <span class="agent-name"><span class="hey-word">Hey</span> Casa</span>
          <span class="agent-tagline" id="agentTagline">Pronto — cosa vuoi fare?</span>
        </div>
      </div>

      <button class="icon-btn" id="clearBtn" title="Nuova conversazione">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="messages" id="messages"></div>
    </div>

    <div class="input-zone">
      <div class="suggestions-row" id="suggestionsRow"></div>

      <div class="input-bar">
        <textarea
          id="userInput"
          placeholder="Hey Casa, …"
          rows="1"
          autocomplete="off"
          spellcheck="true"
          autofocus
        ></textarea>
        <button class="mic-btn" id="micBtn" aria-label="Parla con Casa" title="Parla con Casa">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" disabled aria-label="Invia">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

      <div class="input-hint" id="inputHint">
        Premi <kbd>Enter</kbd> per inviare &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> per a capo &nbsp;·&nbsp; <kbd>🎙</kbd> per parlare
      </div>
    </div>

    <!-- PWA install banner — shown only on mobile when not installed -->
    <div class="pwa-banner" id="pwaBanner" role="complementary" aria-label="Installa l'app">
      <img src="assets/images/logo.png" alt="Hey Casa" class="pwa-banner-logo">
      <div class="pwa-banner-body">
        <strong>Aggiungi Hey Casa</strong>
        <span id="pwaBannerSub">Accesso rapido dalla home, funziona anche offline.</span>
      </div>
      <button class="pwa-install-btn" id="pwaInstallBtn">Installa</button>
      <button class="pwa-dismiss-btn" id="pwaDismissBtn" aria-label="Chiudi">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

  </main>
</div>

<!-- gradient definitions shared across all SVG avatars -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <linearGradient id="grad-rainbow" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="30%"  stop-color="#ffd93d"/>
      <stop offset="65%"  stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
</svg>

<script src="assets/core/fake-agent.js"></script>
<script src="assets/app.js"></script>
<script src="assets/pwa.js"></script>
</body>
</html>
